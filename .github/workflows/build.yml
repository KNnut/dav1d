name: Build
on: [push, pull_request]
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [
          "arm-linux-musleabihf",
          "arm-freebsd",
          "aarch64-macos",
          "x86-windows-gnu",
          "x86_64-netbsd",
          "riscv64-openbsd",
          "loongarch64-linux-gnu",
          # "powerpc64le-freebsd",
          "powerpc64le-linux-musl",
          "powerpc64-openbsd",
        ]
    runs-on: macos-26
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup zig
        uses: mlugg/setup-zig@v2

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }}
